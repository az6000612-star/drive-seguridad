<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DRIVE - Seguridad Vial</title>
    <meta name="theme-color" content="#0F4C81">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>tailwind.config={theme:{extend:{colors:{primary:"#0F4C81",inicio:"#2A323C",danger:"#EB5757",success:"#27AE60"}}}};</script>
    <style>
      *{margin:0;padding:0;box-sizing:border-box;}
      body{font-family:Arial,sans-serif;background:#f3f4f6;}
      .pantalla{display:none;} .activa{display:block;}
      .espera{padding:2rem;text-align:center;background:#fffbeb;border:2px solid #fbbf24;border-radius:1rem;margin:2rem 0;}
    </style>
</head>
<body>

<div id="pantallaLogo" class="activa w-full h-screen bg-inicio flex flex-col justify-center items-center text-center p-6">
    <h1 class="text-6xl font-bold text-green-400 mb-4">DRIVE</h1>
    <p class="text-white text-xl mb-8">Seguridad Vial</p>
    <button onclick="irADatos()" class="bg-green-500 px-10 py-3 rounded-xl text-white font-bold">Ingresar</button>
</div>

<div id="pantallaDatos" class="pantalla max-w-md mx-auto p-4">
    <header class="bg-primary text-white p-4 rounded-xl mb-4">
        <h2 class="text-xl font-bold">📋 Datos del Viaje</h2>
    </header>
    <div class="bg-white p-4 rounded-xl shadow mb-4 space-y-3">
        <input type="text" id="conductor" placeholder="Nombre completo" class="w-full p-3 border rounded" required>
        <input type="text" id="placa" placeholder="Placa" class="w-full p-3 border rounded" required>
        <select id="tipoVeh" class="w-full p-3 border rounded">
            <option value="liviano">Liviano</option>
            <option value="pesado">Pesado</option>
        </select>
        <input type="text" id="inicio" placeholder="Origen" class="w-full p-3 border rounded" required>
        <input type="text" id="destino" placeholder="Destino" class="w-full p-3 border rounded" required>
    </div>
    <div class="bg-white p-4 rounded-xl shadow mb-4 space-y-3">
        <h3 class="font-semibold mb-2">🔍 Revisión</h3>
        <select id="revVeh" class="w-full p-2 border rounded"><option value="">¿Vehículo ok?</option><option value="ok">Sí</option><option value="no">No</option></select>
        <select id="revEquipo" class="w-full p-2 border rounded"><option value="">¿Equipo ok?</option><option value="ok">Sí</option><option value="no">No</option></select>
        <select id="revDescanso" class="w-full p-2 border rounded"><option value="">¿Descansado?</option><option value="ok">Sí</option><option value="no">No</option></select>
        <select id="revDoc" class="w-full p-2 border rounded"><option value="">¿Documentos ok?</option><option value="ok">Sí</option><option value="no">No</option></select>
        <textarea id="observaciones" rows="2" placeholder="Observaciones" class="w-full p-2 border rounded"></textarea>
    </div>
    <button onclick="enviar()" class="w-full bg-primary text-white p-4 rounded-xl font-bold">📤 Enviar para autorización</button>
</div>

<div id="pantallaEspera" class="pantalla max-w-md mx-auto p-4">
    <div class="espera">
        <h2 class="text-2xl font-bold text-amber-700">⏳ ESPERANDO</h2>
        <p class="mt-3">Tu solicitud está en revisión...</p>
        <p class="text-sm text-gray-600 mt-2">No cierres la aplicación</p>
    </div>
    <div id="aprobado" class="hidden bg-green-50 border border-green-300 p-5 rounded-xl text-center mt-4">
        <h3 class="text-xl font-bold text-green-700">✅ LUZ VERDE</h3>
        <p class="my-3">Autorizado para iniciar viaje</p>
        <button onclick="alert('Viaje iniciado')" class="w-full bg-success text-white p-3 rounded-lg">🚀 Iniciar Viaje</button>
    </div>
    <div id="rechazado" class="hidden bg-red-50 border border-red-300 p-5 rounded-xl text-center mt-4">
        <h3 class="text-xl font-bold text-red-700">❌ LUZ ROJA</h3>
        <p class="my-3">No autorizado, revisa datos</p>
        <button onclick="volver()" class="w-full bg-gray-500 text-white p-3 rounded-lg">Volver</button>
    </div>
</div>

<script>
const URL = "https://drive-seguridad.onrender.com";
let codigo = null;
let intervalo = null;

function irADatos() {
  document.getElementById("pantallaLogo").classList.remove("activa");
  document.getElementById("pantallaDatos").classList.add("activa");
}

async function enviar() {
  const datos = {
    conductor: document.getElementById("conductor").value.trim(),
    placa: document.getElementById("placa").value.trim(),
    tipoVeh: document.getElementById("tipoVeh").value,
    inicio: document.getElementById("inicio").value.trim(),
    destino: document.getElementById("destino").value.trim(),
    revVeh: document.getElementById("revVeh").value,
    revEquipo: document.getElementById("revEquipo").value,
    revDescanso: document.getElementById("revDescanso").value,
    revDoc: document.getElementById("revDoc").value,
    observaciones: document.getElementById("observaciones").value.trim()
  };
  if (!datos.conductor || !datos.placa || !datos.inicio || !datos.destino || !datos.revVeh || !datos.revEquipo || !datos.revDescanso || !datos.revDoc) return alert("⚠️ Completa todo");

  try {
    const res = await fetch(`${URL}/enviar-solicitud`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(datos) });
    const r = await res.json();
    if (r.exito) {
      codigo = r.codigo;
      window.open(r.enlaceWhatsApp, "_blank");
      document.getElementById("pantallaDatos").classList.remove("activa");
      document.getElementById("pantallaEspera").classList.add("activa");
      intervalo = setInterval(verificar, 2000); // Revisa cada 2 segundos
    }
  } catch (e) { alert("❌ Sin conexión"); }
}

async function verificar() {
  if (!codigo) return;
  try {
    const res = await fetch(`${URL}/estado/${codigo}`);
    const d = await res.json();
    if (d.estado === "aprobado") {
      clearInterval(intervalo);
      document.getElementById("aprobado").classList.remove("hidden");
    } else if (d.estado === "rechazado") {
      clearInterval(intervalo);
      document.getElementById("rechazado").classList.remove("hidden");
    }
  } catch (e) {}
}

function volver() {
  clearInterval(intervalo);
  codigo = null;
  document.getElementById("pantallaEspera").classList.remove("activa");
  document.getElementById("pantallaDatos").classList.add("activa");
  document.getElementById("aprobado").classList.add("hidden");
  document.getElementById("rechazado").classList.add("hidden");
}
</script>
</body>
</html>
